name: Build Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR with Maven
        run: mvn clean package -f pom.xml

      - name: Build EXE with jpackage
        run: |
          jpackage `
            --input target/ `
            --name WwlcFX `
            --main-jar wwlc-fx-1.0.jar `
            --main-class com.wwlc.Main `
            --type exe `
            --dest output/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WwlcFX-Windows
          path: output/

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install JavaFX
        run: |
          wget https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip
          unzip openjfx-21.0.2_osx-x64_bin-sdk.zip

      - name: Build JAR with Maven
        run: mvn clean package -f pom.xml

      - name: Build DMG with jpackage
        run: |
          jpackage \
            --input target/ \
            --name WwlcFX \
            --main-jar wwlc-fx-1.0.jar \
            --main-class com.wwlc.Main \
            --type dmg \
            --dest output/ \
            --module-path javafx-sdk-21.0.2/lib \
            --add-modules javafx.controls,javafx.fxml,javafx.media

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WwlcFX-Mac
          path: output/
